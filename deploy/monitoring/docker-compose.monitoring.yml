# =============================================================================
# FitIntel Pro — Monitoring Stack
# =============================================================================
# Запуск:
#   docker compose -f docker-compose.monitoring.yml up -d
# =============================================================================

version: '3.8'

services:
  # === Prometheus ===
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: fitintel-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - monitoring

  # === Grafana ===
  grafana:
    image: grafana/grafana:10.4.0
    container_name: fitintel-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-fitintel}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - monitoring
    depends_on:
      - prometheus

  # === Zabbix Server ===
  zabbix-server:
    image: zabbix/zabbix-server-pgsql:7.0-alpine
    container_name: fitintel-zabbix-server
    restart: unless-stopped
    environment:
      - DB_SERVER_HOST=zabbix-db
      - POSTGRES_DB=zabbix
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=${ZABBIX_DB_PASSWORD:-zabbix}
      - ZBX_STARTVMwareCOLLECTORS=0
      - ZBX_VMWAREPERFREQUENCY=60
    ports:
      - "10051:10051"
    volumes:
      - zabbix-alert-scripts:/usr/lib/zabbix/alertscripts
      - zabbix-external-scripts:/usr/lib/zabbix/externalscripts
    networks:
      - monitoring
    depends_on:
      - zabbix-db

  # === Zabbix Web ===
  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:7.0-alpine
    container_name: fitintel-zabbix-web
    restart: unless-stopped
    environment:
      - ZBX_SERVER_HOST=zabbix-server
      - DB_SERVER_HOST=zabbix-db
      - POSTGRES_DB=zabbix
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=${ZABBIX_DB_PASSWORD:-zabbix}
      - PHP_TZ=Europe/Moscow
    ports:
      - "8080:8080"
    networks:
      - monitoring
    depends_on:
      - zabbix-server
      - zabbix-db

  # === Zabbix DB ===
  zabbix-db:
    image: postgres:16-alpine
    container_name: fitintel-zabbix-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=zabbix
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=${ZABBIX_DB_PASSWORD:-zabbix}
    volumes:
      - zabbix-db-data:/var/lib/postgresql/data
    networks:
      - monitoring

  # === Alertmanager ===
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: fitintel-alertmanager
    restart: unless-stopped
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  zabbix-db-data:
  zabbix-alert-scripts:
  zabbix-external-scripts:
  alertmanager-data:
