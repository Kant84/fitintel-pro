version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: fitintel-db
    environment:
      POSTGRES_DB: fitnexus_ai
      POSTGRES_USER: fitnexus_user
      POSTGRES_PASSWORD: FitNexus_User_2026!
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitnexus_user -d fitnexus_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fitintel-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
