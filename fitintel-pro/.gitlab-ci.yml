# FitIntel Pro — GitLab CI/CD Pipeline
# Stages: test → build → deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE/fitintel-pro
  DOCKER_TAG: $CI_COMMIT_SHORT_SHA

stages:
  - lint
  - test
  - build
  - deploy

# ========== LINT ==========
lint:python:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install ruff mypy
  script:
    - ruff check app/ --ignore E501
    - mypy app/ --ignore-missing-imports --warn-return-any
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# ========== TEST ==========
test:unit:
  stage: test
  image: python:3.12-slim
  services:
    - postgres:16-alpine
    - redis:7-alpine
  variables:
    POSTGRES_DB: fitnexus_test
    POSTGRES_USER: test_user
    POSTGRES_PASSWORD: test_pass
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    REDIS_HOST: redis
    REDIS_PORT: 6379
    SECRET_KEY: test_secret_key_for_ci_only
    APP_ENV: test
  before_script:
    - pip install -r requirements.txt pytest pytest-asyncio httpx
  script:
    - pytest tests/ -v --tb=short --ignore=tests/integration --ignore=tests/e2e
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

test:integration:
  stage: test
  image: python:3.12-slim
  services:
    - postgres:16-alpine
    - redis:7-alpine
  variables:
    POSTGRES_DB: fitnexus_test
    POSTGRES_USER: test_user
    POSTGRES_PASSWORD: test_pass
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    REDIS_HOST: redis
    REDIS_PORT: 6379
    SECRET_KEY: test_secret_key_for_ci_only
    APP_ENV: test
    TEST_API_BASE_URL: http://localhost:8000/api/v1
  before_script:
    - pip install -r requirements.txt pytest pytest-asyncio httpx requests
    - alembic upgrade head
    - python -c "from app.db.seed.seed_permissions import seed_permissions; from app.db.seed.seed_roles import seed_roles; from app.db.seed.seed_admin import seed_admin; from app.db.session import SessionLocal; db = SessionLocal(); seed_permissions(db); seed_roles(db); seed_admin(db); db.commit(); db.close()"
  script:
    - uvicorn app.main:app --host 0.0.0.0 --port 8000 &
    - sleep 5
    - pytest tests/integration -v --tb=short
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# ========== BUILD ==========
build:docker:
  stage: build
  image: docker:25-dind
  services:
    - docker:25-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE:$DOCKER_TAG -t $DOCKER_IMAGE:latest .
    - docker push $DOCKER_IMAGE:$DOCKER_TAG
    - docker push $DOCKER_IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ========== DEPLOY ==========
deploy:prod:
  stage: deploy
  image: alpine/k8s:1.29.0
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
  script:
    - ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "cd /opt/fitintel && docker pull $DOCKER_IMAGE:$DOCKER_TAG && docker compose up -d"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $DEPLOY_ENABLED == "true"
  environment:
    name: production
    url: https://api.fitintel.pro
