# =============================================================================
# Role: common — базовая настройка всех серверов
# =============================================================================

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install base packages
  apt:
    name:
      - curl
      - wget
      - vim
      - htop
      - iotop
      - net-tools
      - telnet
      - unzip
      - git
      - tmux
      - logrotate
      - unattended-upgrades
      - fail2ban
      - ufw
      - chrony
      - jq
    state: present

- name: Configure timezone
  timezone:
    name: Europe/Moscow

- name: Configure NTP
  template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
  notify: restart chrony

- name: Enable chrony
  service:
    name: chronyd
    state: started
    enabled: yes

# === Security ===
- name: Configure fail2ban
  template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
  notify: restart fail2ban

- name: Enable fail2ban
  service:
    name: fail2ban
    state: started
    enabled: yes

# === Firewall ===
- name: Allow SSH
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny

# === Logrotate ===
- name: Configure logrotate for app logs
  template:
    src: logrotate-fitintel.j2
    dest: /etc/logrotate.d/fitintel

# === System limits ===
- name: Configure system limits
  template:
    src: limits.conf.j2
    dest: /etc/security/limits.d/99-fitintel.conf

# === Kernel params ===
- name: Configure sysctl
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  loop:
    - { key: "vm.swappiness", value: "10" }
    - { key: "vm.overcommit_memory", value: "1" }
    - { key: "net.core.somaxconn", value: "65535" }
    - { key: "fs.file-max", value: "2097152" }
    - { key: "net.ipv4.ip_local_port_range", value: "1024 65535" }
    - { key: "net.ipv4.tcp_tw_reuse", value: "1" }

# === App user ===
- name: Create fitintel user
  user:
    name: fitintel
    system: yes
    shell: /bin/bash
    home: /opt/fitintel
    createhome: yes

- name: Create app directories
  file:
    path: "{{ item }}"
    state: directory
    owner: fitintel
    group: fitintel
    mode: '0755'
  loop:
    - /opt/fitintel/app
    - /opt/fitintel/logs
    - /opt/fitintel/backups
    - /opt/fitintel/config
