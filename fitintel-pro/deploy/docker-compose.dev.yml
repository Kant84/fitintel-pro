version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fitnexus_ai
      POSTGRES_USER: fitnexus_user
      POSTGRES_PASSWORD: FitNexus_User_2026!
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitnexus_user -d fitnexus_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENV: dev
      APP_DEBUG: "true"
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: fitnexus_ai
      POSTGRES_USER: fitnexus_user
      POSTGRES_PASSWORD: FitNexus_User_2026!
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: dev_secret_key_change_in_production
      DOCS_ENABLED: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ../app:/app/app:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_dev:
