# =============================================================================
# FitIntel Pro — Ansible: Main Playbook
# =============================================================================
# Запуск:
#   ansible-playbook -i inventory/yandex.yml playbooks/site.yml
#   ansible-playbook -i inventory/yandex.yml playbooks/site.yml --tags zabbix
# =============================================================================

- name: Common setup for all servers
  hosts: all
  become: yes
  roles:
    - role: common
  tags:
    - always

- name: Setup Nginx load balancer
  hosts: api
  become: yes
  roles:
    - role: nginx
  tags:
    - nginx
    - api

- name: Setup PostgreSQL
  hosts: databases
  become: yes
  roles:
    - role: postgresql
  tags:
    - postgres
    - db

- name: Setup Redis
  hosts: api[0]
  become: yes
  roles:
    - role: redis
  tags:
    - redis

- name: Setup monitoring
  hosts: monitoring
  become: yes
  roles:
    - role: zabbix_server
    - role: prometheus
    - role: grafana
  tags:
    - monitoring

- name: Install Zabbix agents
  hosts: all
  become: yes
  roles:
    - role: zabbix_agent
  tags:
    - zabbix
    - agent

- name: Install Prometheus exporters
  hosts: all
  become: yes
  roles:
    - role: prometheus_exporter
  tags:
    - prometheus
    - exporter
