# =============================================================================
# Role: zabbix_agent — Zabbix Agent 2
# =============================================================================

- name: Add Zabbix repository
  apt:
    deb: "https://repo.zabbix.com/zabbix/7.0/ubuntu/pool/main/z/zabbix-release/zabbix-release_7.0-2+ubuntu24.04_all.deb"
  ignore_errors: yes

- name: Update apt cache after Zabbix repo
  apt:
    update_cache: yes

- name: Install Zabbix Agent 2
  apt:
    name:
      - zabbix-agent2
      - zabbix-agent2-plugin-postgresql
    state: present

- name: Configure Zabbix Agent 2
  template:
    src: zabbix_agent2.conf.j2
    dest: /etc/zabbix/zabbix_agent2.conf
  vars:
    zabbix_server_host: "{{ groups['monitoring'][0] }}"
    zabbix_server_port: 10051
    zabbix_hostname: "{{ inventory_hostname }}"
  notify: restart zabbix-agent2

- name: Enable Zabbix Agent 2
  service:
    name: zabbix-agent2
    state: started
    enabled: yes

- name: Add host to Zabbix via API (on first run)
  uri:
    url: "http://{{ groups['monitoring'][0] }}:8080/api_jsonrpc.php"
    method: POST
    body_format: json
    body:
      jsonrpc: "2.0"
      method: "host.create"
      params:
        host: "{{ inventory_hostname }}"
        interfaces:
          - type: 1
            main: 1
            useip: 1
            ip: "{{ ansible_host }}"
            dns: ""
            port: "10050"
        groups:
          - groupid: "2"
        templates:
          - templateid: "10084"
      auth: "{{ zabbix_api_token | default('') }}"
      id: 1
    status_code: [200, 500]
  ignore_errors: yes
  delegate_to: localhost
  run_once: no
