# =============================================================================
# Prometheus Configuration
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Prometheus self
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter (все серверы)
  - job_name: 'node'
    static_configs:
      - targets:
        - 'api-1:9100'
        - 'api-2:9100'
        - 'db-master:9100'
        - 'db-replica:9100'
        - 'monitoring:9100'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # PostgreSQL Exporter
  - job_name: 'postgresql'
    static_configs:
      - targets:
        - 'db-master:9187'
        - 'db-replica:9187'

  # cAdvisor (Docker containers)
  - job_name: 'cadvisor'
    static_configs:
      - targets:
        - 'api-1:8080'
        - 'api-2:8080'
        - 'db-master:8080'
        - 'db-replica:8080'

  # FastAPI приложение
  - job_name: 'fitintel-api'
    static_configs:
      - targets:
        - 'api-1:8000'
        - 'api-2:8000'
    metrics_path: /metrics

# Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9093']

# Rules
rule_files:
  - '/etc/prometheus/rules/*.yml'
